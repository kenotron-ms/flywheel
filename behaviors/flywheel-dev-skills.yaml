---
    bundle:
      name: flywheel-dev-skills-behavior
      version: 0.1.0
      description: |
        Registers @flywheel:skills with tool-skills.
        Included last in flywheel-dev.md to win over lean-foundation's tool-skills config.

    # Re-declare tool-skills with flywheel skills path + visibility off
    # (last declaration wins in Amplifier's tool deduplication)
    tools:
      - module: tool-skills
        source: git+https://github.com/microsoft/amplifier-module-tool-skills@main
        config:
          skills:
            - "@flywheel:skills"
          visibility:
            enabled: false
    